server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force-response: true   # 确保 JSON 等响应使用 UTF-8，避免中文乱码
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1

spring:
  profiles:
    active: ${SPRING_PROFILE:local}  # 默认使用本地开发环境配置
    
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Actuator + Prometheus 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Knife4j API 文档（各环境可覆盖此配置）
knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  openapi:
    title: 时光地图 API
    version: 1.0.0
    description: 时光地图后端服务接口文档
