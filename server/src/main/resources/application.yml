server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/timemap?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 腾讯云 COS 配置
cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ${COS_REGION:ap-shanghai}
  bucket: ${COS_BUCKET:time-map-1318253552}

# 微信小程序配置
wechat:
  app-id: ${WX_APP_ID:}
  app-secret: ${WX_APP_SECRET:}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:timemap-dev-secret-key-change-in-production}
  expiration: 604800000  # 7天
