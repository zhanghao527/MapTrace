# 生产环境配置
# 所有敏感配置使用环境变量，此文件可以安全提交到 Git
# 使用方法：java -jar app.jar --spring.profiles.active=prod

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/timemap?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}  # 必须设置环境变量
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  data:
    redis:
      host: ${REDIS_HOST}  # 必须设置环境变量
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# JWT 配置（必须使用强随机密钥）
jwt:
  secret: ${JWT_SECRET}  # 必须设置环境变量，无默认值
  expiration: 604800000  # 7天

# 腾讯云 COS 配置
cos:
  secret-id: ${COS_SECRET_ID}  # 必须设置环境变量
  secret-key: ${COS_SECRET_KEY}  # 必须设置环境变量
  region: ${COS_REGION:ap-shanghai}
  bucket: ${COS_BUCKET}  # 必须设置环境变量

# 微信小程序配置
wechat:
  app-id: ${WX_APP_ID}  # 必须设置环境变量
  app-secret: ${WX_APP_SECRET}  # 必须设置环境变量

# 腾讯地图配置
tencent-map:
  key: ${TENCENT_MAP_KEY}  # 必须设置环境变量

# 管理员用户 ID
admin:
  user-ids: ${ADMIN_USER_IDS:}

# MyBatis 配置（生产环境关闭 SQL 日志）
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
