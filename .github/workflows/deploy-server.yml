# 后端自动部署 - push 到 main 分支时触发
# 流程：SSH 到服务器 → git pull → Maven 打包 → 重启服务
#
# 需要在 GitHub Secrets 中配置：
#   SERVER_HOST     - 服务器 IP
#   SERVER_USER     - SSH 用户名
#   SERVER_SSH_KEY  - SSH 私钥
#
# 服务器上需要提前准备：
#   1. 安装 JDK 17 和 Maven
#   2. git clone 项目到 /www/maptrace/repo
#   3. 创建 /www/maptrace/env.conf

name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /www/maptrace/repo

            # 拉取最新代码
            git pull origin main

            # 打包
            cd server
            mvn clean package -DskipTests -q

            # 停止旧进程
            cd /www/maptrace
            if [ -f app.pid ]; then
              kill $(cat app.pid) 2>/dev/null || true
              sleep 3
            fi

            # 复制新 jar
            cp /www/maptrace/repo/server/target/maptrace-server-*.jar /www/maptrace/app.jar

            # 加载环境变量并启动
            source /www/maptrace/env.conf

            nohup java \
              -Xms256m -Xmx512m \
              -jar /www/maptrace/app.jar \
              --spring.profiles.active=prod > /www/maptrace/app.log 2>&1 &

            echo $! > /www/maptrace/app.pid
            echo "服务已启动，PID: $(cat /www/maptrace/app.pid)"

            # 等待启动并检查
            sleep 12
            curl -sf http://localhost:8080/actuator/health && echo " ✅ 部署成功" || echo " ⚠️ 健康检查未通过"
