# 后端自动部署 - push 到 main 分支时触发
# 流程：Maven 打包 → SCP 上传 jar → SSH 重启服务
#
# 需要在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#   SERVER_HOST       - 服务器 IP 地址
#   SERVER_USER       - SSH 登录用户名（如 root）
#   SERVER_SSH_KEY    - SSH 私钥（公钥放到服务器 ~/.ssh/authorized_keys）

name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q
        working-directory: server

      - name: Upload jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "server/target/maptrace-server-*.jar"
          target: /www/maptrace
          strip_components: 2

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /www/maptrace

            # 重命名 jar 为固定名称
            mv maptrace-server-*.jar app.jar 2>/dev/null || true

            # 停止旧进程
            if [ -f app.pid ]; then
              kill $(cat app.pid) 2>/dev/null || true
              sleep 3
            fi

            # 加载环境变量并启动
            source /www/maptrace/env.conf

            nohup java -jar \
              -Xms256m -Xmx512m \
              --spring.profiles.active=prod \
              app.jar > /www/maptrace/app.log 2>&1 &

            echo $! > app.pid
            echo "服务已启动，PID: $(cat app.pid)"

            # 等待启动并检查
            sleep 12
            curl -sf http://localhost:8080/actuator/health && echo " ✅ 部署成功" || echo " ⚠️ 健康检查未通过，查看日志: tail -100 /www/maptrace/app.log"
